name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs of the same workflow on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───── Backend ─────
  backend:
    name: backend — lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        # Bundles TimescaleDB (M2 availability hypertable) + pgvector (M3
        # embeddings) + pg_trgm / unaccent / btree_gin. Drop-in for the
        # postgres image: same POSTGRES_* env vars, same init scripts.
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: bibliohack
          POSTGRES_PASSWORD: bibliohack
          POSTGRES_DB: bibliohack
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bibliohack -d bibliohack"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://bibliohack:bibliohack@localhost:5432/bibliohack
      DATABASE_URL_SYNC: postgresql+psycopg://bibliohack:bibliohack@localhost:5432/bibliohack
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  # ───── Frontend ─────
  frontend:
    name: frontend — lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Prettier (format check)
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: Typecheck (astro check + tsc)
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test

  # ───── Docker build sanity ─────
  docker-build:
    name: docker — build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/backend.Dockerfile
          push: false
          load: true
          tags: bibliohack-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/frontend.Dockerfile
          push: false
          load: true
          tags: bibliohack-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───── Deploy to the NAS (only on a GREEN push to main) ─────
  # Gated three ways so a broken build can never reach production:
  #   - `needs:` → runs only after backend + frontend + docker-build all pass
  #   - `if:`    → only on a direct push to main (never PRs/forks), and only
  #               once enabled via the `AUTODEPLOY_ENABLED` repo variable
  # Reaches the NAS (no public inbound) over Tailscale, then deploys over SSH.
  # Design + required secrets: ARCHITECTURE.md §10.1.
  deploy:
    name: deploy — NAS (biblio.josearcos.me)
    needs: [backend, frontend, docker-build]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && vars.AUTODEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: https://biblio.josearcos.me
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    env:
      NAS: ${{ secrets.NAS_SSH_USER }}@${{ secrets.NAS_SSH_HOST }}
      PORT: ${{ secrets.NAS_SSH_PORT }}
      DIR: /volume1/docker/bibliohack
      DC: /usr/local/bin/docker compose -f docker-compose.prod.yml
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale (ephemeral, tag:ci)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Install deploy SSH key
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.NAS_SSH_KEY }}" > "$HOME/.ssh/ci"
          chmod 600 "$HOME/.ssh/ci"

      - name: Ship code to the NAS (tar over ssh — rsync is gated on Synology)
        run: |
          tar czf - \
            --exclude=.git --exclude=node_modules --exclude=.venv \
            --exclude=__pycache__ --exclude=dist --exclude=.astro \
            --exclude=.mypy_cache --exclude=.ruff_cache --exclude=.pytest_cache . \
          | ssh -i "$HOME/.ssh/ci" -p "$PORT" -o StrictHostKeyChecking=accept-new \
              "$NAS" "mkdir -p $DIR && tar xzf - -C $DIR"

      - name: Build, start, and migrate
        run: |
          ssh -i "$HOME/.ssh/ci" -p "$PORT" -o StrictHostKeyChecking=accept-new "$NAS" \
            "cd $DIR && $DC up -d --build && sleep 6 && $DC exec -T api alembic upgrade head"

      - name: Post-deploy health gate (fails the deploy if unhealthy)
        run: |
          for i in $(seq 1 12); do
            if curl -fsS --max-time 8 https://biblio.josearcos.me/healthz | grep -q '"status":"ok"'; then
              echo "✅ healthy after deploy"; exit 0
            fi
            echo "waiting for /healthz … ($i/12)"; sleep 6
          done
          echo "❌ /healthz not OK after deploy"; exit 1

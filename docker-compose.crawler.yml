# ───────────────────────────────────────────────────────────────
# biblioHack — autonomous crawler (the NAS COMPUTE PLANE).
#
# Deliberately SEPARATE from docker-compose.prod.yml: the public api/frontend
# CD must never be blocked by this heavy (Firefox) image build. This runs the
# Scrapling/Camoufox OPAC crawler on a schedule (supercronic) and reaches the
# prod Postgres over the existing private `bibliohack_bibliohack` network.
#
# Bring up ONCE on the NAS (from /volume1/docker/bibliohack):
#   docker compose -f docker-compose.crawler.yml up -d --build
# `restart: unless-stopped` then keeps it crawling across reboots — set & forget.
#
# Requires the same .env (POSTGRES_PASSWORD) used by docker-compose.prod.yml.
# Tune growth/politeness via the env block below. See ARCHITECTURE.md §10.
# ───────────────────────────────────────────────────────────────

services:
  crawler:
    build:
      context: .
      dockerfile: infra/crawler.Dockerfile
      # Synology BuildKit needs host DNS for apt + `camoufox fetch` downloads
      # (same reason as the api/frontend builds).
      network: host
    image: bibliohack-crawler
    container_name: bibliohack-crawler
    restart: unless-stopped
    environment:
      APP_ENV: production
      # Reach the prod Postgres by container name on the shared private network.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bibliohack}:${POSTGRES_PASSWORD}@bibliohack-postgres:5432/${POSTGRES_DB:-bibliohack}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-bibliohack}:${POSTGRES_PASSWORD}@bibliohack-postgres:5432/${POSTGRES_DB:-bibliohack}
      # Be a good citizen to the public OPAC.
      SCRAPER_USER_AGENT: "bibliohack/0.1 (+https://biblio.josearcos.me)"
      # Crawl budget + nightly bounds (consumed by run-job.sh). Tune here.
      CRAWL_RATE: "1.0"          # requests/sec to the OPAC (polite; don't raise casually)
      DISCOVER_YEAR_FROM: "2024" # novedades window (publication year >=)
      # Steady-state throughput is DISCOVER-bound: each hourly run seeds this
      # many TITNs and the worker drains them, so this number IS the daily rate
      # (×24). Raised 100→400 on 2026-06-13 (~9.6k/day) once the pooled browser
      # session (commit dbe7486) removed the per-record launch cost — the worker
      # now has ample headroom above 400/hr, so the discovered backlog still
      # shrinks instead of outrunning ingest (the invariant to preserve). Kept
      # deliberately below the (now higher, still unmeasured) worker ceiling;
      # watch the failure-rate + pending-task panels and push to 600-800 if green.
      # CRAWL_RATE stays at 1.0 — that is the politeness/compliance gate, not this.
      DISCOVER_MAX: "400"        # TITNs discovered per hourly run (= the daily rate ×24)
      # Must stay >= DISCOVER_MAX with margin so a run always clears the hour's
      # discovery plus any residual backlog; a cap, rarely reached.
      WORKER_MAX: "1000"         # records ingested per hourly run (cap; rarely reached)
      REFRESH_MAX: "300"         # records re-probed per 6-hourly run
      COVERS_MAX: "100"          # cover ISBNs resolved per 2-hourly run (off-OPAC)
      EMBED_MAX: "200"           # records embedded per 3-hourly run (off-OPAC, via HF)
      RELEVANCE_WINDOW_DAYS: "90" # trailing availability window the nightly relevance recompute reads (off-OPAC, pure DB)
      # Resolve covers into the shared store (the api serves them read-only).
      COVERS_STORE_PATH: /covers
      # BGE-M3 embeddings via the HF Inference API (token from .env).
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN:-}
    networks:
      - bibliohack
    volumes:
      # Shared cover store: the resolver writes here; the api mounts it ro.
      - /volume1/docker/bibliohack/covers:/covers
    # Firefox needs far more shared memory than Docker's 64MB default.
    shm_size: "1gb"
    # The NAS runs an old (4.4) kernel; relax seccomp so the browser's
    # syscalls aren't blocked when it launches headless.
    security_opt:
      - seccomp:unconfined

networks:
  # The private bridge created by docker-compose.prod.yml (project `bibliohack`).
  bibliohack:
    external: true
    name: bibliohack_bibliohack
